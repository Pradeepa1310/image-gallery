<html>
<head>
 <meta name="viewport" content="width=device-width, initial-scale=1">
 <style>
   body {
       font-family: Arial, sans-serif;
       background-color: #c4c3d1;
       margin: 0;
       padding: 0;
       text-align: center;
       border: solid black;
 }

.heading {
  padding: 30px 0;
  font-size: 36px;
  font-weight: 200px;
  color: #2b0533;
  text-decoration: underline;
  text-transform: uppercase;
  font-family: fantasy;
}

.product-container {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 40px;
  padding: 0 60px 60px;
  justify-items: center;
}

.product-card {
  
  border-radius: 8px;
  text-align: center;
}

.product-card img {
  width: 200px;
  height: 200px;
  object-fit: cover;
  border-radius: 10px;
}

.product-card h3 {
  margin: 10px 0 5px;
  font-size: 18px;
  font-weight: bold;
}

.product-card p {
  font-size: 16px;
  margin: 0;
}
</style>
</head>
<body>
    <h1 class="heading">Benzz Footwear</h1>
    <div class="product-container">
  <div class="product-card">
    <img src="womens wear.jpeg" alt="Womens wear">
    <h3>Womens wear</h3>
    <p>Rs.300</p>
  </div>
  <div class="product-card">
    <img src="snicker shoe.jpeg" alt="Snicker shoe">
    <h3>snicker </h3>
    <p>Rs.350</p>
  </div>
  <div class="product-card">
    <img src="filp flop.jpeg" alt="mens filp flop">
    <h3>Mens Flip Flop</h3>
    <p>Rs.400</p>
  </div>
  <div class="product-card">
    <img src="party wear.jpeg" alt="party wear">
    <h3>party wear</h3>
    <p>Rs.999</p>
  </div>
  <div class="product-card">
    <img src="images (5).jpeg" alt="womems filpflop">
    <h3>womens flipflop</h3>
    <p>Rs.720</p>
  </div>
  <div class="product-card">
    <img src="images (7).jpeg" alt="heels">
    <h3>Heels</h3>
    <p>Rs.550</p>
  </div>
</div>
